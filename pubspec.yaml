name: bfs_learn
description: 信奥 BFS 专题离线学习 App
publish_to: 'none'
version: 5.4.2+542

environment:
  sdk: ^3.7.0

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  intl: ^0.19.0
  flutter_riverpod: ^2.6.1
  shared_preferences: ^2.5.3
  path_provider: ^2.1.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/data/content_manifest.json
    - assets/data/lessons/
    - assets/data/quizzes/
    - assets/data/mistakes/
    - assets/data/bfs_steps.json
    - assets/data/knowledge/
    - assets/data/cpp/
